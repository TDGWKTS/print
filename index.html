<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Station Inspection Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            color: #1a365d;
            margin-top: 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .user-info {
            background-color: #ebf8ff;
            border-left: 4px solid #3182ce;
            padding: 12px;
            margin-bottom: 25px;
            border-radius: 0 4px 4px 0;
            font-size: 0.95em;
        }
        .control-panel {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 25px;
            background: #f7fafc;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #edf2f7;
        }
        label {
            font-weight: 600;
            color: #4a5568;
        }
        select, input[type="month"] {
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-size: 1em;
            background-color: #fff;
        }
        button {
            padding: 9px 16px;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary { background-color: #3182ce; color: white; }
        .btn-primary:hover { background-color: #2b6cb0; }
        .btn-success { background-color: #38a169; color: white; }
        .btn-success:hover { background-color: #2f855a; }
        .btn-secondary { background-color: #4a5568; color: white; }
        .btn-secondary:hover { background-color: #2d3748; }
        
        /* Fixed Status Messenger Area Styling */
        #statusDiv {
            margin: 15px 0;
            padding: 10px;
            border-radius: 4px;
            font-weight: 500;
            display: none; /* Controlled dynamically by JS */
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .data-table th, .data-table td {
            border: 1px solid #e2e8f0;
            padding: 10px;
            text-align: left;
        }
        .data-table th {
            background-color: #edf2f7;
            color: #2d3748;
            font-weight: 600;
        }
        .data-table tr:nth-child(even) { background-color: #f7fafc; }
        .no-data {
            text-align: center;
            padding: 30px;
            color: #718096;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Inspection Management System</h1>
    
    <div class="user-info">
        Logged in Session — Station: <strong id="lblStation">-</strong> | Post: <strong id="lblPost">-</strong>
    </div>

    <div class="control-panel">
        <div>
            <label for="txtTargetMonth">Select Month: </label>
            <input type="month" id="txtTargetMonth">
        </div>

        <button class="btn-secondary" id="btnDownloadTemplate">📥 Download Template</button>
        <button class="btn-primary" id="btnShowRecords">🔍 Show Records</button>
        <button class="btn-success" id="btnDownloadData">📊 Download Data (JSON)</button>
    </div>

    <div id="statusDiv"></div>

    <div id="tableWrapper">
        <table class="data-table" id="recordsTable" style="display: none;">
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyMessage" class="no-data">Select a target month and click "Show Records" to display data.</div>
    </div>
</div>

<script>
    // ==========================================
    // ⚙️ SYSTEM CONFIGURATION
    // ==========================================
    const API_BASE = "https://inspection-sync.tdgwkts.workers.dev/api";

    // Mock retrieval of session states (Fallback settings map to your credentials context)
    const sessionContext = {
        stationId: localStorage.getItem("stationId") || "IETS", 
        post: localStorage.getItem("post") || "I(TD)25",
        token: localStorage.getItem("sessionToken") || ""
    };

    // Initialize UI Text Fields
    document.getElementById("lblStation").innerText = sessionContext.stationId.toUpperCase();
    document.getElementById("lblPost").innerText = sessionContext.post;
    
    // Default the month selector tool input element to current date automatically
    const today = new Date();
    const currentYearMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
    document.getElementById("txtTargetMonth").value = currentYearMonth;

    // ==========================================
    // 🛡️ REVISED STATUS DIV LOGGER ENGINE (FIXED)
    // ==========================================
    function showStatus(message, isError = false) {
        const statusElement = document.getElementById("statusDiv");
        if (!statusElement) {
            console.log((isError ? "ERROR: " : "STATUS: ") + message);
            return;
        }

        if (!message) {
            statusElement.style.display = "none";
            return;
        }

        statusElement.style.display = "block";
        statusElement.innerText = message;
        
        if (isError) {
            statusElement.style.backgroundColor = "#fff5f5";
            statusElement.style.border = "1px solid #feb2b2";
            statusElement.style.color = "#c53030";
        } else {
            statusElement.style.backgroundColor = "#f0fff4";
            statusElement.style.border = "1px solid #9ae6b4";
            statusElement.style.color = "#22543d";
        }
    }

    // Helper to format HTML month elements ("2026-05") into Worker parameters ("202605")
    function getCleanYearMonth() {
        const rawVal = document.getElementById("txtTargetMonth").value; // e.g. "2026-05"
        if (!rawVal) return "";
        return rawVal.replace("-", "");
    }

    // ==========================================
    // 📁 ACTION: DOWNLOAD TEMPLATE
    // ==========================================
    document.getElementById("btnDownloadTemplate").addEventListener("click", function() {
        showStatus("Initializing template download stream...");
        const targetUrl = `${API_BASE}/get-template?station=${sessionContext.stationId.toLowerCase()}`;
        window.open(targetUrl, "_blank");
        showStatus(""); // Clear text status cleanly
    });

    // ==========================================
    // 🔍 ACTION: SHOW RECORDS
    // ==========================================
    document.getElementById("btnShowRecords").addEventListener("click", async function handleShowRecords() {
        const yearMonth = getCleanYearMonth();
        if (!yearMonth) {
            showStatus("Please select a target year and month filter input constraint.", true);
            return;
        }

        showStatus("Fetching inspection logs from storage repository engine...");
        
        try {
            const response = await fetch(`${API_BASE}/get-inspections`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    stationId: sessionContext.stationId,
                    yearMonth: yearMonth
                })
            });

            if (!response.ok) throw new Error(`Server returned HTTP code status error context: ${response.status}`);
            
            const result = await response.json();
            if (!result.success) throw new Error(result.error || "Failed loading items array registry records.");

            renderTableData(result.inspections);
            showStatus(""); // Dismiss loader window cleanly

        } catch (err) {
            showStatus(`Error pulling records: ${err.message}`, true);
            console.error(err);
        }
    });

    // ==========================================
    // 📊 ACTION: DOWNLOAD JSON DATA
    // ==========================================
    document.getElementById("btnDownloadData").addEventListener("click", async function handleDownloadData() {
        const yearMonth = getCleanYearMonth();
        if (!yearMonth) {
            showStatus("Please choose a date before running download exports calculations processing pipelines.", true);
            return;
        }

        showStatus("Preparing data package for local export download...");

        try {
            const response = await fetch(`${API_BASE}/get-inspections`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    stationId: sessionContext.stationId,
                    yearMonth: yearMonth
                })
            });

            if (!response.ok) throw new Error(`HTTP network fault error index value: ${response.status}`);
            const result = await response.json();

            if (!result.inspections || result.inspections.length === 0) {
                showStatus("No data logs exist matching this timeline parameters block to download.", true);
                return;
            }

            // Parse text arrays directly into a file download trigger attachment structure injection pipeline
            const blob = new Blob([JSON.stringify(result.inspections, null, 2)], { type: "application/json" });
            const downloadUrl = URL.createObjectURL(blob);
            const hiddenAnchor = document.createElement("a");
            
            hiddenAnchor.href = downloadUrl;
            hiddenAnchor.download = `records_${sessionContext.stationId.toLowerCase()}_${yearMonth}.json`;
            document.body.appendChild(hiddenAnchor);
            hiddenAnchor.click();
            
            document.body.removeChild(hiddenAnchor);
            URL.revokeObjectURL(downloadUrl);
            
            showStatus("Export file compiled successfully!");

        } catch (err) {
            showStatus(`Export processing pipe crash exception block details: ${err.message}`, true);
        }
    });

    // ==========================================
    // 🖨️ UI RENDER COMPONENT HANDLER
    // ==========================================
    function renderTableData(inspectionsList) {
        const tableElement = document.getElementById("recordsTable");
        const emptyMsgElement = document.getElementById("emptyMessage");
        const headerRow = document.getElementById("tableHeaders");
        const tbodyElement = document.getElementById("tableBody");

        // Flush elements
        headerRow.innerHTML = "";
        tbodyElement.innerHTML = "";

        if (!inspectionsList || inspectionsList.length === 0) {
            tableElement.style.display = "none";
            emptyMsgElement.style.display = "block";
            emptyMsgElement.innerText = "No data inspection records found tracking back to this month parameter selection constraint.";
            return;
        }

        // Isolate global map tracking labels using unique keys from index 0 mapping layout configurations properties
        const comprehensiveHeaderKeys = Object.keys(inspectionsList[0]);

        // Build Table headers
        comprehensiveHeaderKeys.forEach(key => {
            const th = document.createElement("th");
            th.innerText = key;
            headerRow.appendChild(th);
        });

        // Loop rows
        inspectionsList.forEach(rowItem => {
            const tr = document.createElement("tr");
            comprehensiveHeaderKeys.forEach(key => {
                const td = document.createElement("td");
                // Fallback handling string or object structures inside cells cleanly
                const val = rowItem[key];
                td.innerText = (typeof val === "object" && val !== null) ? JSON.stringify(val) : (val !== undefined ? val : "");
                tr.appendChild(td);
            });
            tbodyElement.appendChild(tr);
        });

        emptyMsgElement.style.display = "none";
        tableElement.style.display = "table";
    }
</script>

</body>
</html>
